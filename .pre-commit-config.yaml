# Pre-commit configuration to physically block secrets and PHI from leaving the local machine.
# To install: pip install pre-commit && pre-commit install

repos:
  # 1. Strip output from Jupyter Notebooks (Prevents PHI leakage)
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  # 2. TruffleHog Secrets Scanning (Blocks API keys, SSH keys, Passwords)
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.73.0
    hooks:
      - id: trufflehog
        name: TruffleHog Secrets Scan
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail'
        pass_filenames: false

  # 3. Code Formatting & Basic Linting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 4. Flake8 Linting (Blocks broken Python syntax)
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=127', '--extend-ignore=E203']
