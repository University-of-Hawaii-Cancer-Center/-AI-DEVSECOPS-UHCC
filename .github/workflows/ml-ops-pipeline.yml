name: UHCC ML Ops Security Pipeline

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-and-linting:
    name: 🔒 SAST & Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting & SAST Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit nbstripout

      - name: Verify Jupyter Notebooks are Stripped
        run: |
          nbstripout --is-installed || echo "nbstripout missing from git filters"
          # This forces a failure if raw cell outputs (like PHI) are found in committed notebooks
          find . -name "*.ipynb" -exec nbstripout --force {} \;
          git diff --exit-code || (echo "ERROR: Jupyter notebooks contain unstripped outputs (potential PHI leakage). Run nbstripout locally before committing." && exit 1)

      - name: Lint with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Bandit Security Scan
        run: bandit -r src -ll -ii -f sarif -o bandit-results.sarif

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  llm-evaluation:
    name: 🧠 Promptfoo Evaluation
    runs-on: ubuntu-latest
    needs: security-and-linting
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js for Promptfoo
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run LLM Guardrails Evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # Note: Only injected on runners for Tier 3 tasks
        run: |
          echo "Executing deterministic prompt evaluation against compliance matrix..."
          # Uses the config to test for PII leakage, hallucinations, and toxicity
          promptfoo eval --config promptfooconfig.yaml --share

  container-build:
    name: 🐳 Secure Container Build
    runs-on: ubuntu-latest
    needs: llm-evaluation
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Scan Docker Image
        run: |
          docker build -t uhcc-ai-pipeline:${{ github.sha }} .
          # In a full deployment, Trivy or Anchore would scan this image before pushing to the registry
          echo "Container built successfully. Ready for HPC Koa/Mana air-gapped deployment."
